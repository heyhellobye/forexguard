services:
  - type: web
    name: forexguard
    runtime: python
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALERT_MIN_SEVERITY
        value: MEDIUM